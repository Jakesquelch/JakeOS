<main class="habit">
    <div class="habit-container">
        <h1>Habit Tracker</h1>

        <div class="add-habit">
            <input [(ngModel)]="newHabitName" placeholder="New habit (e.g. Read 10 pages)" (keyup.enter)="addHabit()" />
            <button (click)="addHabit()">Add Habit</button>
        </div>

        <ul class="habit-list">
            <li *ngFor="let habit of habits()">
                <div class="habit-header">
                    <strong>{{ habit.name }}</strong>
                    <span class="streak" *ngIf="streak(habit) > 0">🔥 {{ streak(habit) }} day streak</span>
                    <button class="delete" (click)="deleteHabit(habit.id)">Delete</button>
                </div>
                <div class="day-grid">
                    <button
                        *ngFor="let day of recentDays"
                        class="day-cell"
                        [class.done]="isDone(habit, day.date)"
                        [class.today]="day.date === today"
                        (click)="toggleDay(habit, day.date)"
                        [title]="day.date"
                    >
                        {{ day.label }}
                    </button>
                </div>
            </li>
        </ul>
    </div>
</main>
