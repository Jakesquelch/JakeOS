<section class="page">
  <p class="eyebrow">{{ doneToday() }} of {{ habits().length }} done today</p>
  <h1 class="page-title">Habits</h1>
  <p class="page-sub">Small things, done daily.</p>

  <div class="toolbar">
    <input class="field grow" [(ngModel)]="newHabitName" (keyup.enter)="addHabit()" placeholder="New habit, e.g. Read 10 pages…" />
    <button class="btn" (click)="addHabit()">Add habit</button>
  </div>

  <div class="card habit-row" *ngFor="let habit of habits()">
    <div class="habit-top">
      <strong>{{ habit.name }}</strong>
      <span class="pill md streak" *ngIf="streak(habit) > 0">🔥 {{ streak(habit) }} day streak</span>
      <span class="habit-actions">
        <button class="icon-btn danger" (click)="deleteHabit(habit.id)">Delete</button>
      </span>
    </div>
    <div class="week">
      <button
        *ngFor="let day of recentDays"
        class="day"
        [class.on]="isDone(habit, day.date)"
        [class.today]="day.date === today"
        [title]="day.date"
        (click)="toggleDay(habit, day.date)"
      >
        {{ day.label }}<b>{{ day.dayNum }}</b>
      </button>
    </div>
  </div>

  <p class="empty" *ngIf="habits().length === 0" style="padding-left: 0">
    No habits yet — start with something small.
  </p>
</section>
