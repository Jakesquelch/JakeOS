<section class="page">
  <p class="eyebrow">{{ sortedEntries().length }} {{ sortedEntries().length === 1 ? 'entry' : 'entries' }}</p>
  <h1 class="page-title">Journal</h1>
  <p class="page-sub">No structure required. Just write.</p>

  <div class="composer">
    <textarea class="field" [(ngModel)]="newEntryContent" rows="4" placeholder="What's on your mind?"></textarea>
    <div class="composer-row">
      <button class="btn" (click)="addEntry()">Add entry</button>
    </div>
  </div>

  <article class="card entry" *ngFor="let entry of sortedEntries()">
    <p class="entry-date">
      {{ entry.createdAt | date: 'EEE d MMM · h:mm a' }}
      <span class="row-actions" *ngIf="editingEntryId !== entry.id">
        <button class="icon-btn" (click)="editEntry(entry)">Edit</button>
        <button class="icon-btn danger" (click)="deleteEntry(entry.id)">Delete</button>
      </span>
    </p>

    <div class="entry-edit" *ngIf="editingEntryId === entry.id">
      <textarea class="field" [(ngModel)]="editEntryContent" rows="4"></textarea>
      <div class="composer-row">
        <button class="icon-btn" (click)="saveEntry(entry)">Save</button>
        <button class="icon-btn" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>

    <p class="entry-body" *ngIf="editingEntryId !== entry.id">{{ entry.content }}</p>
  </article>

  <p class="empty" *ngIf="sortedEntries().length === 0" style="padding-left: 0">
    Your first entry is waiting to be written.
  </p>
</section>
